# ---------------------------------------------------------------------------
# Padrões regex de alta precisão por agente
# Texto de entrada já chega normalizado (minúsculas, sem acento).
# Use \\b para word boundary. Adicione apenas quando termo isolado não basta.
# ---------------------------------------------------------------------------
intent_patterns_by_agent:
  1:  # Tecnologia de Queijos
    - "\\bpizza\\b"
    - "\\bmu?ss?arela\\b|\\bmozarela\\b|\\bmucarela\\b"
    - "\\bderretimento\\b"
    - "\\bbrowning\\b"
    - "\\bfilagem\\b"
    - "\\bprensagem\\b"
    - "\\bprovolone\\b"
    # Defeitos técnicos documentados nos artigos Ha-La Biotec do Agente 1 (fix confusão 1→5)
    - "\\bestufamento\\b"
    - "\\bclc\\b"
    - "\\bbutiric[ao]\\b"
    - "\\bamargor\\b"
    - "\\bolfatura\\b|\\bolhadura\\b|\\btrinca\\b"
  2:  # Fermentados
    - "\\biogurte\\b"
    - "\\bfermentacao\\b"
    - "\\bsinerese\\b"
    - "\\bacido\\s+latico\\b"
    - "\\bkefir\\b"
    - "\\bcoalhada\\b"
  3:  # Regulatórios
    - "\\brotulag"
    - "\\brdc\\b"
    - "\\bin\\s*\\d{1,4}\\b"
    - "\\briispoa\\b"
    - "\\bart\\.?\\s*\\d+\\b"
    - "\\binstrucao\\s+normativa\\b"
    - "\\bmedida\\s+provisoria\\b"
  4:  # Qualidade do Leite
    - "\\bformaldeido\\b"
    - "\\bdornic\\b"
    - "\\bccs\\b"
    - "\\bcbt\\b"
    - "\\bacidez\\s+titulavel\\b"
    - "\\bcrioscopia\\b"
    - "\\balizarol\\b"
    # "método A/B/C/D" com boundary — não captura "método de prevenção"
    - "\\bmetodo\\s+[a-d]\\b"

