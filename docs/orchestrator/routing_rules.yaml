# routing_rules.yaml — Regras de sinalização do fast-path determinístico
#
# PROPÓSITO:
#   Externaliza todos os conjuntos de termos e padrões regex usados pelo
#   orquestrador para classificar perguntas sem chamar o LLM (fast-path).
#   Edite este arquivo para adicionar/remover sinais de domínio sem tocar
#   em código Python. O orquestrador recarrega ao reiniciar.
#
# CONVENÇÃO DE TERMOS:
#   - Inclua tanto a forma sem acento quanto com acento quando a função de
#     detecção usa _contains_any_phrase() (que normaliza o texto de entrada).
#   - Para cada bloco não óbvio, adicione um comentário explicando o porquê
#     (ex: qual confusão de roteamento o termo resolve).
#
# SE O ARQUIVO ESTIVER AUSENTE OU CORROMPIDO:
#   O orquestrador loga um warning e opera com sets vazios — o sistema ainda
#   funciona via LLM classifier, com menor precisão no fast-path.

