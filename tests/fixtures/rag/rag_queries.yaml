  answer: "A GDL reduz o pH do leite e pode imitar parcialmente o efeito ácido do soro-fermento na melhoria da coagulação, mas não inocula lactobacilos, cocos termofílicos nem enzimas de maturação. O controle de dose e tempo é crítico, porque hidrólise excessiva antes da coagulação pode causar queda exagerada de pH, desmineralização descontrolada e defeitos estruturais."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 16."

