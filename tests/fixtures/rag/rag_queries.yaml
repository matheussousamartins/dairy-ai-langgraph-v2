  - Portaria SVS/MS n. 27
  answer: A RDC 54/2012 incorpora ao ordenamento nacional a Resolução GMC MERCOSUL nº 01/2012 e revoga a Portaria SVS/MS nº 27, de 13 de janeiro
    de 1998.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
