  expected: contém açúcares próprios dos ingredientes
  answer: Se o alimento não atender ao atributo 'isento de açúcares', deve declarar junto à declaração a frase 'contém açúcares próprios dos ingredientes'.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Posso fazer informação nutricional complementar para um açúcar específico, tipo sacarose ou frutose?
