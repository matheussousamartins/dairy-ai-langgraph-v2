  expected_all:
  - 6 g de proteínas
  - 12 g de proteínas
  answer: Para 'fonte de proteínas', o mínimo é 6 g de proteínas por porção. Para 'alto conteúdo de proteínas', o mínimo é 12 g por porção. Além
    disso, as quantidades de aminoácidos essenciais devem atender à Tabela I.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Quais são os mínimos para declarar 'fonte de fibra' e 'alto teor de fibra'?
  expected_all:
  - 3 g de fibra
  - 2,5 g de fibra
  - 6 g de fibra
  - 5 g de fibra
  answer: Para 'fonte de fibra', o alimento deve ter no mínimo 3 g por 100 g ou 100 ml em pratos preparados e no mínimo 2,5 g por porção. Para
    'alto conteúdo de fibra', são exigidos no mínimo 6 g por 100 g ou 100 ml e 5 g por porção.

