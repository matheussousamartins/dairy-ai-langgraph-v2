  answer: "O ponto correto ocorre quando os grãos estão secos, individualizados e ainda mantêm forte coesão quando suavemente apertados na mão. Grãos muito úmidos elevam risco de acidez, trincas e perda de grana; grãos excessivamente secos dificultam soldagem, geram textura quebradiça e podem prejudicar rendimento."
  evidence: "Elaboração técnica dos principais queijos duros na América Latina — tópico 8."

