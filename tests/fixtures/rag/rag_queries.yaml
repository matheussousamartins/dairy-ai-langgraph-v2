  answer: "A agitação e o aquecimento devem começar imediatamente após o corte, sem interrupção. A taxa de aquecimento recomendada é de aproximadamente 2 °C por minuto, com temperatura final de 54 a 56 °C em cerca de 12 minutos. Após atingir essa temperatura, a agitação rápida continua por aproximadamente 25 a 30 minutos."
  evidence: "Elaboração técnica dos principais queijos duros na América Latina — tópico 8."

