  answer: "A lisozima é permitida no Grana Padano e proibida no Parmigiano Reggiano. No Grana Padano, ela é usada como recurso adicional contra bacilos anaeróbios do grupo butírico, substituindo o uso histórico de formaldeído, que foi proibido."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópicos 2 e 12."

