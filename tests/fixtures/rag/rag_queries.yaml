  - 5 mg de colesterol
  answer: Para 'baixo em colesterol', o máximo é 20 mg. Para 'não contém colesterol', o máximo é 5 mg. Em ambos os casos, o alimento deve atender
    às condições para 'baixo em gorduras saturadas'.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
