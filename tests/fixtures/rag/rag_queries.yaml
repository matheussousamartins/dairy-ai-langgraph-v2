  answer: Não. Além do máximo de 0,5 g de gorduras totais, o produto também precisa cumprir as condições para não conter gorduras saturadas, gorduras
    trans e colesterol, e nenhum outro tipo de gordura pode ser declarado acima de zero.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Qual é a regra para 'baixo em gordura saturada' e 'não contém gordura trans'?
  expected_all:
  - 1,5 g da soma de gorduras saturadas e trans
  - 0,1 g de gorduras trans
  answer: Para 'baixo em gordura saturada', o máximo é 1,5 g da soma de gorduras saturadas e trans, deve cumprir a condição de não conter gorduras
    trans e a energia proveniente de gorduras saturadas não pode ultrapassar 10% do valor energético total. Para 'não contém gordura trans', o
    máximo é 0,1 g e o alimento deve atender ao critério de baixo conteúdo para gorduras saturadas.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
