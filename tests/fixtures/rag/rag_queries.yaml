  question: "Além de desnatar, por que o affioramento é tão importante nos Grana italianos?"
  answer: "O affioramento funciona como semidesnate natural e depuração microbiológica. A ascensão dos glóbulos de gordura remove parte da gordura, células somáticas e esporos de Clostridia, ajudada por euglobulinas que agregam glóbulos e arrastam microbiota para a camada de creme. Dados citados indicam redução média de cerca de 43% da gordura, 92% das células somáticas e 95% dos esporos."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 11."

