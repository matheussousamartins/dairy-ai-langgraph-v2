  - reinspecionar produtos de origem animal procedentes do comércio interestadual ou internacional
  answer: Sim. A fiscalização do Ministério da Agricultura se estende às casas atacadistas que recebem e armazenam produtos de origem animal,
    com objetivo de reinspecionar produtos procedentes do comércio interestadual ou internacional.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: riispoa_decreto_9013_2017
  pergunta: Um estabelecimento sem SIF pode exportar?
  expected: Apenas os estabelecimentos de produtos de origem animal que funcionem sob o SIF podem realizar comércio internacional
  answer: Não. Somente estabelecimentos que funcionem sob o SIF podem realizar comércio internacional.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
