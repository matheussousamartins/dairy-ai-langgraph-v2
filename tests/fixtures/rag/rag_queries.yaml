  expected_all:
  - 80 mg de sódio
  - 40 mg de sódio
  - 5 mg de sódio
  answer: Para 'baixo em sódio', o máximo é 80 mg. Para 'muito baixo em sódio', o máximo é 40 mg. Para 'não contém sódio', o máximo é 5 mg, conforme
    a base de cálculo prevista na RDC 54/2012.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
