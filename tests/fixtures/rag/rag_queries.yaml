  difficulty: "média"
  question: "Como deve ser o corte da coalhada nos Grana italianos para formar a textura típica?"
  answer: "A coalhada deve ser cortada extremamente mole. A coagulação ocorre em cerca de 9 a 11 minutos, e o corte começa após apenas 1 a 2 minutos adicionais de ligeiro endurecimento, com tempo total próximo de 13 minutos entre adição do coalho e início do corte. O objetivo é obter grãos muito pequenos, com tamanho máximo aproximado de 3 mm."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 9."

- agent_id: 1
