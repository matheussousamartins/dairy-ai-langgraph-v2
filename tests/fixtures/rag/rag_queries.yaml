  answer: Não. Para usar 'não contém açúcares', a lista de ingredientes não pode trazer açúcares nem ingredientes entendidos como alimentos com
    açúcares, salvo se estiverem declarados com asterisco referenciando 'fornece quantidades não significativas de açúcares'.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
