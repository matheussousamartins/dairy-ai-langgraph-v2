  - o pescado e seus derivados
  - os ovos e seus derivados
  - o leite e seus derivados
  - os produtos de abelhas e seus derivados
  answer: Entram no alcance do decreto os animais destinados ao abate, a carne e seus derivados, o pescado e seus derivados, os ovos e seus derivados,
    o leite e seus derivados e os produtos de abelhas e seus derivados, comestíveis e não comestíveis, com adição ou não de produtos vegetais.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: riispoa_decreto_9013_2017
