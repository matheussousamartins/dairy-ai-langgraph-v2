  - 30% da IDR
  answer: Para 'fonte', o alimento deve fornecer no mínimo 15% da IDR. Para 'alto conteúdo', no mínimo 30% da IDR, conforme a base de cálculo
    aplicável.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
