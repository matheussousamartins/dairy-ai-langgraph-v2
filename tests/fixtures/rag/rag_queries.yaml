  question: "Como deve ser o soro-fermento típico dos queijos Grana em acidez, pH, dose e população microbiana?"
  answer: "O soro-fermento normalmente apresenta acidez de 120 a 140 °D e pH entre 3,7 e 3,9. A dose usada é elevada, geralmente entre 3,0 e 3,5% do volume de leite na tina, para elevar a acidez do leite para cerca de 20 a 22 °D no momento da coagulação. A população total pode ultrapassar 1 bilhão de UFC/mL entre 18 e 24 horas, com Lactobacillus helveticus podendo atingir cerca de 800 milhões de UFC/mL."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 5."

- agent_id: 1
