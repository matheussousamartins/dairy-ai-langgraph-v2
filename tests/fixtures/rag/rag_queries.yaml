  question: "Se um Parmesão apresenta ardência desagradável no final da mastigação, qual origem tecnológica deve ser investigada primeiro?"
  answer: "A principal suspeita é leite com alta contagem de psicrotróficos, especialmente Pseudomonas, capazes de produzir lipases termorresistentes. Essas enzimas resistem à pasteurização, degradam triglicerídeos durante a cura e liberam principalmente ácido butírico, causando sabor ardido. Esse defeito não deve ser confundido com o sabor picante, acentuado e levemente cítrico de um Parmesão bem maturado."
  evidence: "Base técnica completa sobre queijo Parmesão no Brasil — tópicos 5.2 e 13.6."

