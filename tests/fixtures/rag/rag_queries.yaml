  question: "O que pode explicar Parmesão mais úmido, macio, ácido e sem textura granulosa quando a coalhada foi cortada tarde demais?"
  answer: "Quando a coalhada já está muito dura no corte, não se formam grãos finos. Grãos maiores retêm mais soro, secam menos, acidificam com facilidade e resultam em queijo mais úmido, macio e ácido, com prejuízo da textura granulosa. O corte inadequado também prolonga a fabricação, favorece casca úmida e pode permitir crescimento de bactérias e leveduras, inclusive Brevibacterium linens."
