  answer: "A cura mínima recomendada é de 12 meses a 16–18 °C, com umidade relativa máxima de 80%. Nas primeiras 4 semanas, são feitas viragens regulares e lavagem da casca a cada 8 a 10 dias com solução de 5% NaCl e 5% CaO. Após 30 dias, pode-se tratar a casca com óleo de linhaça, algodão ou dendê a cada 3 semanas por cerca de 2 meses. A partir do terceiro mês, podem ser aplicados álcool com 10% de sorbato de potássio, mistura 50/50 de álcool 70 °GL e água com 0,5% de natamicina, ou 0,05% de propionato de cálcio."
