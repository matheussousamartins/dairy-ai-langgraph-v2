  question: "Por que o resfriamento prolongado do leite prejudica a fabricação de Grana?"
  answer: "O resfriamento intenso desloca parte da β-caseína e dos sais de cálcio para fora da micela, reduzindo o tamanho micelar e formando gel mais frágil. Leite mantido a 5 °C por 24 horas forma coalhada menos consistente do que leite mantido a 14 °C por 24 horas, prejudicando corte, sinérese, rendimento e qualidade final."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 10."

