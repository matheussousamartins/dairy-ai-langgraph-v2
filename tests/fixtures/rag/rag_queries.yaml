  answer: Pode, mas deve incluir um esclarecimento logo após a declaração informando que todos os alimentos desse tipo também possuem essa característica.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Esse esclarecimento de característica inerente precisa aparecer com qual destaque?
  expected_all:
  - 50% do tamanho
  - cor contrastante
  answer: O esclarecimento deve usar o mesmo tipo de letra da declaração, com pelo menos 50% do tamanho da informação nutricional complementar,
    em cor contrastante ao fundo e com visibilidade e legibilidade garantidas.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Posso usar mais de uma informação nutricional complementar no mesmo produto se ele cumprir mais de uma condição?
  expected: mais de um atributo
  answer: Sim. Se o alimento cumprir mais de um atributo previsto nas tabelas da RDC 54/2012, podem constar no rótulo as declarações correspondentes.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Para fazer declaração comparativa, com o que eu comparo?
  expected: alimento de referência
  answer: A comparação deve ser feita com o alimento de referência, que é a versão convencional do mesmo alimento usada como padrão comparativo.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Se eu não tiver versão equivalente do mesmo fabricante, como faço a comparação?
  expected_all:
  - valor médio
  - três alimentos de referência
  answer: Nesse caso, deve ser usado o valor médio do conteúdo de três alimentos de referência comercializados no país de processamento e/ou comercialização.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Se não existir alimento de referência, posso usar declaração comparativa mesmo assim?
  expected: não se pode utilizar INC comparativa
  answer: Não. Sem alimento de referência, não é permitido usar informação nutricional complementar comparativa.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Na declaração comparativa, as porções comparadas podem ser diferentes?
  expected_all:
  - porções comparadas
  - devem ser iguais
  answer: Não. Os tamanhos das porções comparadas devem ser iguais, considerando o alimento pronto para o consumo.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Em prato preparado com declaração comparativa, a comparação é por porção?
  expected_all:
  - pratos preparados
  - 100 gramas
  - 100 mililitros
  answer: Para pratos preparados, a comparação deve ser feita por 100 gramas ou 100 mililitros do produto.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: No rótulo de uma declaração comparativa, preciso dizer com quem comparei?
  expected_all:
  - mesmo fabricante
  - média dos alimentos de referência do mercado
  answer: Sim. O rótulo ou a publicidade deve indicar se a comparação foi feita com o alimento de referência do mesmo fabricante ou com a média
    dos alimentos de referência do mercado.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: A diferença da declaração comparativa precisa ser mostrada em número?
  expected_all:
  - expressa quantitativamente
  - porcentagem
  - fração
  - quantidade absoluta
  answer: Sim. A diferença no nutriente ou valor energético comparado deve ser expressa quantitativamente no rótulo, em porcentagem, fração ou
    quantidade absoluta.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Em que idioma a informação nutricional complementar tem que estar?
  expected_all:
  - idioma oficial do país de consumo
  - espanhol ou português
  answer: A informação nutricional complementar deve estar redigida no idioma oficial do país de consumo, ou seja, em espanhol ou português.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Posso deixar visível um texto em outro idioma que contrarie a RDC 54/2012?
  expected: não devem estar visíveis
  answer: Não. Se houver textos em outros idiomas relacionados à informação nutricional complementar que não cumpram a RDC 54/2012, eles não devem
    estar visíveis no rótulo.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Quais termos são aceitos para informação nutricional complementar de conteúdo absoluto?
  expected_all:
  - baixo
  - não contém
  - alto conteúdo
  - alto teor
  - fonte
  - muito baixo
  - sem adição
  answer: Para conteúdo absoluto, são autorizados termos como baixo, não contém, alto conteúdo/alto teor, fonte, muito baixo e sem adição.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Quais termos são aceitos para informação nutricional complementar comparativa?
  expected_all:
  - reduzido
  - aumentado
  - light
  answer: Para conteúdo comparativo, são autorizados os termos reduzido, aumentado e light.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Qual é o limite para usar 'baixo em valor energético' e 'não contém valor energético'?
  expected_all:
  - 40 kcal
  - 170 kJ
  - 4 kcal
  - 17 kJ
  answer: Para 'baixo em valor energético', o máximo é 40 kcal (170 kJ). Para 'não contém valor energético', o máximo é 4 kcal (17 kJ), observadas
    as bases de cálculo previstas na RDC 54/2012.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Quais são os limites para 'baixo em açúcares' e 'não contém açúcares'?
  expected_all:
  - 5 g de açúcares
  - 0,5 g de açúcares
  answer: Para 'baixo em açúcares', o máximo é 5 g de açúcares. Para 'não contém açúcares', o máximo é 0,5 g de açúcares, conforme a base de cálculo
    aplicável.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Posso declarar 'não contém açúcares' se tiver açúcar ou ingrediente açucarado na lista?
  expected_all:
