- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Em produto fracionado ou em unidades de consumo, em quais bases a declaração tem que fechar?
  expected_all:
  - unidades de consumo ou fracionados
  - porção de referência
  - porção declarada
  answer: Nesses casos, a informação nutricional complementar deve ser atendida tanto na porção de referência quanto na porção declarada na tabela
