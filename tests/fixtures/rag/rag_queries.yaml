  question: "Quais diferenças principais separam Parmigiano Reggiano e Grana Padano no processo italiano?"
  answer: "O Parmigiano Reggiano tem produção média menor, cerca de 6.000 L por dia, não permite silagem, não permite lisozima, faz affioramento uma vez ao dia por 10 a 15 horas, remove 55 a 70% da gordura no affioramento, cozinha a cerca de 55 a 57 °C e matura geralmente entre 18 e 24 meses. O Grana Padano tem escala média maior, cerca de 17.000 L por dia, permite silagem, permite lisozima, faz affioramento duas vezes ao dia por 5 a 7 horas, remove 40 a 45% da gordura, cozinha a cerca de 53 a 55 °C e matura entre 12 e 18 meses."
