  expected_all:
  - 3 g de gorduras totais
  - 0,5 g de gorduras totais
  answer: Para 'baixo em gorduras totais', o máximo é 3 g. Para 'não contém gorduras totais', o máximo é 0,5 g, conforme a base de cálculo prevista
    na RDC 54/2012.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
