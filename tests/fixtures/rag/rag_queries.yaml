  question: "Qual relação entre gordura, caseína e textura granulosa nos queijos Grana?"
  answer: "A textura granulosa depende de leite semidesnatado e teor moderado de gordura. A relação gordura/caseína não deve ultrapassar aproximadamente 0,9 a 1,0; para leite com 2,3% de caseína, isso corresponde a cerca de 2,2 a 2,3% de gordura. Gordura excessiva torna a massa mais plástica, úmida e propensa a empelotar quando ralada, enquanto teor moderadamente baixo favorece fratura granulosa, firmeza e estabilidade funcional."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 4."

