  question: "Por que o processo Grana usa alta carga microbiana inicial, mas tenta evitar acidificação forte dentro do tanque?"
  answer: "A alta carga microbiana fornece biomassa e enzimas para a maturação, mas a acidificação excessiva dentro dos grãos formaria ácido lático, que reage com o fosfoparacaseinato de cálcio e gera lactato de cálcio solúvel. O cálcio perdido no soro reduz a mineralização da massa e aumenta risco de massa frágil, casca menos flexível, trincas internas, microfuros, fissuras externas e penetração de mofos."
  evidence: "Fundamentos técnicos completos dos queijos Grana italianos — tópico 8."

- agent_id: 1
