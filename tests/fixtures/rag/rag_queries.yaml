  - 100 mililitros
  answer: Para pratos preparados semi-prontos ou prontos para consumo, a condição da informação nutricional complementar deve ser atendida em
    100 gramas ou 100 mililitros, conforme o caso.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
  group: rdc_54_2012_informacao_nutricional_complementar
  pergunta: Tem alguma proibição geral sobre como apresentar a informação nutricional complementar no rótulo?
  expected_all:
  - interpretação errônea
  - consumo excessivo
  - nutricionalmente completos
  answer: Sim. A apresentação não pode induzir a interpretação errônea ou engano, incentivar consumo excessivo nem sugerir que o alimento seja
    nutricionalmente completo.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
