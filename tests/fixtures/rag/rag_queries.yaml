  - 10%
  answer: Para proteína e fibra alimentar, o aumento mínimo é de 25%. Para vitaminas e minerais, o aumento mínimo é de 10%, observadas as demais
    condições específicas.

- agent_id: 3
  table_name: embeddings_agente_3_regulatorios
