[pytest]
addopts = -p no:cacheprovider
markers =
    phase0: Fase 0 — Smoke test de ingestão (chunking, embeddings, upsert)
    phase1: Fase 1 — Avaliação de retrieval por agente (hit@k + LLM judge)
    phase2: Fase 2 — Comparação de estratégias de busca (vector vs hybrid)
    phase3: Fase 3 — Avaliação end-to-end do agente (resposta final + LLM judge)
    slow: Testes lentos (chamam API da OpenAI)

testpaths = tests
python_files = test_*.py
python_functions = test_*
